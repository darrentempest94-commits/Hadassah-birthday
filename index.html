<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protocol Hadassah</title>
    <style>
        :root { --pink: #ff69b4; --glow: #ff1493; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
        canvas { position: fixed; top: 0; left: 0; }
        #matrix-canvas { z-index: 1; opacity: 0.6; }
        #particle-canvas { z-index: 2; pointer-events: none; }
        #ui { position: relative; z-index: 10; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        #birthday-text { color: var(--pink); font-size: 4rem; text-align: center; display: none; text-shadow: 0 0 20px var(--glow); font-weight: bold; }
        #big-heart { display: none; font-size: 150px; color: var(--pink); text-shadow: 0 0 30px var(--glow); animation: p 1.5s infinite; }
        @keyframes p { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); } }
        .card { position: absolute; width: 90%; max-width: 900px; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); border: 2px solid var(--pink); border-radius: 15px; padding: 20px; display: none; flex-direction: row; align-items: center; gap: 20px; box-shadow: 0 0 30px rgba(255,20,147,0.3); }
        .photo-side { width: 45%; }
        .photo-side img { width: 100%; border-radius: 8px; border: 1px solid #fff; }
        .poem-side { width: 55%; color: #fff; font-size: 1.2rem; font-style: italic; line-height: 1.4; }
        #curtain { position: fixed; top: -100%; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; transition: top 3s ease-in-out; }
    </style>
</head>
<body>
    <canvas id="matrix-canvas"></canvas>
    <canvas id="particle-canvas"></canvas>
    <div id="curtain"></div>
    <div id="ui">
        <div id="birthday-text"></div>
        <div id="big-heart">❤</div>
        <div class="card" id="c1"><div class="photo-side"><img src="photo1.jpg"></div><div class="poem-side">1. Lumière douce...<br>Hadassah, prénom de reine,<br>Cœur bienveillant...</div></div>
        <div class="card" id="c2"><div class="photo-side"><img src="photo2.jpg"></div><div class="poem-side">2. Courage en soie...<br>Sous ton sourire...</div></div>
        <div class="card" id="c3"><div class="photo-side"><img src="photo3.jpg"></div><div class="poem-side">3. Le sourire...<br>Hadassah, quand tu souris...</div></div>
        <div class="card" id="c4"><div class="photo-side"><img src="photo4.jpg"></div><div class="poem-side">4. Pour ton jour...<br>Joyeux anniversaire !</div></div>
    </div>
<script>
    const mC = document.getElementById('matrix-canvas');
    const m = mC.getContext('2d');
    mC.width = window.innerWidth; mC.height = window.innerHeight;
    const drops = Array(Math.floor(mC.width/18)).fill(1);
    function dM() {
        m.fillStyle = 'rgba(0,0,0,0.1)'; m.fillRect(0,0,mC.width,mC.height);
        m.fillStyle = '#ff69b4'; m.font = '18px monospace';
        drops.forEach((y, i) => {
            m.fillText("HADASSAH"[Math.floor(Math.random()*8)], i*18, y*18);
            if(y*18 > mC.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        });
    }
    setInterval(dM, 50);

    const wait = ms => new Promise(r => setTimeout(r, ms));
    async function run() {
        await wait(4000);
        const bt = document.getElementById('birthday-text');
        bt.style.display = "block";
        for(let w of ["HAPPY","BIRTHDAY","TO","YOU","HADASSAH"]) {
            bt.innerHTML += w + "<br>"; await wait(2000);
        }
        await wait(2000); bt.style.display = "none";
        const h = document.getElementById('big-heart');
        h.style.display = "block"; await wait(2000); h.style.display = "none";
        for(let i=1; i<=4; i++) {
            const c = document.getElementById('c'+i);
            c.style.display = "flex"; await wait(10000); c.style.display = "none";
        }
        document.getElementById('curtain').style.top = "0";
    }
    run();
</script>
</body>
</html>
